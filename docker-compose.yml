services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    command: sh -c "npx prisma db push && npm run dev"
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app                  # mount source — changes reflect instantly
      - /app/node_modules       # keep container's node_modules, don't override with host
      - /app/.next              # same for build cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - doer
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: doer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 10
    networks:
      - doer
    restart: unless-stopped

  # Agent image — built here so it's available; spawned dynamically per task, not kept running
  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: doer-agent
    entrypoint: ["true"]
    restart: "no"
    networks:
      - doer

networks:
  doer:
    name: doer

volumes:
  pgdata:
